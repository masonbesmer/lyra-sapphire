name: Deploy to Production

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    if: ${{ !contains(github.event.head_commit.message, '[skip deploy]') }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      LAVALINK_CONFIG_DIR: ${{ vars.LAVALINK_CONFIG_DIR || '/mnt/user/appdata/lyra/lavalink' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.actor }}/lyra-sapphire:latest

      - name: Detect Lavalink config changes
        id: lavalink_config_change
        shell: bash
        run: |
          if git diff --quiet "${{ github.event.before }}" "${{ github.sha }}" -- lavalink/application.yml; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Sync Lavalink application.yml
        if: steps.lavalink_config_change.outputs.changed == 'true'
        uses: appleboy/scp-action@v1.0.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: root
          key: ${{ secrets.SSH_KEY }}
          port: 38796
          source: lavalink/application.yml
          target: ${{ env.LAVALINK_CONFIG_DIR }}/
          strip_components: 1

      - name: Deploy on server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: root
          key: ${{ secrets.SSH_KEY }}
          port: 38796
          script: |
            docker compose -f /boot/config/plugins/compose.manager/projects/Lyra/docker-compose.yml up -d --pull always

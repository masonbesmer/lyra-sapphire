name: Server Deployment

on:
  push:
    branches: [main]

jobs:
  publish:
    if: ${{ ! contains(github.event.head_commit.message, '[skip deploy]') }}
    name: Publish Docker Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Enable Corepack
        run: corepack enable

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          package-manager-cache: false

        # - name: Install dependencies
        #   run: yarn workspaces focus --production

      - name: Log in to GHCR
        uses: docker/login-action@v4.0.0
        with:
          registry: ghcr.io
          username: ${{ secrets.GHCR_USERNAME }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push container image
        uses: docker/build-push-action@v7.0.0
        with:
          no-cache: true
          context: .
          push: true
          tags: ghcr.io/${{ secrets.GHCR_USERNAME }}/lyra-sapphire:latest

  updateOnServer:
    name: Update running container on server
    runs-on: ubuntu-latest
    needs: publish
    env:
      # Override with repository variable LAVALINK_CONFIG_DIR
      LAVALINK_CONFIG_DIR: ${{ vars.LAVALINK_CONFIG_DIR || '/mnt/user/appdata/lyra/lavalink' }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Detect Lavalink config changes
        id: lavalink_config_change
        shell: bash
        run: |
          if git diff --quiet "${{ github.event.before }}" "${{ github.sha }}" -- lavalink/application.yml; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No changes in lavalink/application.yml"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Detected changes in lavalink/application.yml"
          fi

      # - name: Ensure Lavalink config directory exists on server
      #   if: steps.lavalink_config_change.outputs.changed == 'true'
      #   uses: favware/ssh-remote-action@v1
      #   with:
      #     host: ${{ secrets.SSH_HOST }}
      #     port: ${{ secrets.SSH_PORT }}
      #     key: ${{ secrets.SSH_KEY }}
      #     username: ${{ secrets.SSH_USERNAME }}
      #     command: mkdir -p '${{ env.LAVALINK_CONFIG_DIR }}'
      #     silent: false

      - name: Sync Lavalink application.yml
        if: steps.lavalink_config_change.outputs.changed == 'true'
        uses: appleboy/scp-action@v1.0.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          source: lavalink/application.yml
          target: ${{ env.LAVALINK_CONFIG_DIR }}/
          strip_components: 1

      - name: Update container on server
        uses: favware/ssh-remote-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          port: ${{ secrets.SSH_PORT }}
          key: ${{ secrets.SSH_KEY }}
          username: ${{ secrets.SSH_USERNAME }}
          command: ${{ secrets.SSH_COMMAND }}
          silent: false

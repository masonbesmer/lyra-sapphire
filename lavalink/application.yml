server:
  port: 2333
  address: 0.0.0.0

lavalink:
  server:
    password: 'youshallnotpass'
    sources:
      youtube: false # Disabled — replaced by youtube-source plugin below
      bandcamp: true
      soundcloud: true
      twitch: true
      vimeo: true
      http: true
      local: false

    # Buffer configuration for improved playback stability
    bufferDurationMs: 400
    frameBufferDurationMs: 5000
    youtubePlaylistLoadLimit: 6
    playerUpdateInterval: 5
    youtubeSearchEnabled: true
    soundcloudSearchEnabled: true

  plugins:
    - dependency: 'dev.lavalink.youtube:youtube-plugin:1.18.0'
      repository: 'https://maven.lavalink.dev/releases'
    # - dependency: "com.github.topi314.lavasrc:lavasrc-plugin:4.5.0"
    #   repository: "https://maven.lavalink.dev/releases"

plugins:
  youtube:
    enabled: true
    allowSearch: true
    allowDirectVideoIds: true
    allowDirectPlaylistIds: true
    clients:
      - MUSIC
      - WEB
      - TVHTML5_SIMPLY
      - ANDROID_VR
    clientOptions:
      MUSIC:
        playback: false

metrics:
  prometheus:
    enabled: false
    endpoint: /metrics

sentry:
  dsn: ''
  environment: ''

logging:
  file:
    path: ./logs/

  level:
    root: INFO
    lavalink: INFO

  logback:
    rollingpolicy:
      max-file-size: 1GB
      max-history: 30
